name: release

# Build prebuilt `par` binaries for every supported platform and attach them to
# the GitHub Release for the pushed tag. install.sh / install.ps1 download these
# so users never need a Rust toolchain.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build binaries for, e.g. v0.5.0"
        required: true

permissions:
  contents: write

jobs:
  # taiki-e/upload-rust-binary-action only *uploads* to a release — it does not
  # create one. Create it once up front so every matrix job has a target to
  # attach its archive to.
  create-release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Create the release if it doesn't exist
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $TAG already exists"
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes
          fi

  build:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # par is pure std (no C deps / build.rs), so cross-compiling aarch64 linux
      # just needs the GNU linker — no `cross`/container required.
      - name: Set up aarch64 linux linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      # Builds the release binary, packs it as par-<target>.tar.gz (unix) /
      # par-<target>.zip (windows) with the executable at the archive root, adds
      # a .sha256, and uploads all of it to the tag's release (creating it if
      # absent). The names match what install.sh / install.ps1 fetch.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: par
          target: ${{ matrix.target }}
          archive: par-$target
          checksum: sha256
          ref: refs/tags/${{ github.event.inputs.tag || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
