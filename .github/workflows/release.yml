name: release

# Build prebuilt `par` binaries for every supported platform and attach them to
# the GitHub Release for the pushed tag. install.sh / install.ps1 download these
# so users never need a Rust toolchain.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build binaries for, e.g. v0.5.0"
        required: true

permissions:
  contents: write

jobs:
  # taiki-e/upload-rust-binary-action only *uploads* to a release — it does not
  # create one. Create it once up front so every matrix job has a target to
  # attach its archive to.
  create-release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Create the release if it doesn't exist
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $TAG already exists"
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes
          fi

  build:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux targets are static musl builds: a gnu build links against the
          # runner's (newer) glibc and then won't run on older distros, whereas a
          # fully-static musl binary runs on any Linux (Alpine included). par is
          # pure std, so rustc's self-contained musl needs no external libc.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          # Both macOS targets build on Apple-Silicon runners — they
          # cross-compile the x86_64 slice natively, and the Intel (macos-13)
          # runner pool is scarce and can leave the job queued for hours.
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up musl (x86_64 linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # aarch64 musl cross-links via the GNU aarch64 gcc as the linker driver;
      # rustc supplies the static musl libc itself (par has no C deps).
      - name: Set up aarch64 musl cross linker
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      # Builds the release binary, packs it as par-<target>.tar.gz (unix) /
      # par-<target>.zip (windows) with the executable at the archive root, adds
      # a .sha256, and uploads all of it to the tag's release (creating it if
      # absent). The names match what install.sh / install.ps1 fetch.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: par
          target: ${{ matrix.target }}
          archive: par-$target
          checksum: sha256
          ref: refs/tags/${{ github.event.inputs.tag || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
